  <!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colosal Tienda</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- opening -->
    <div id="opening" class="splash">
      <div class="splash__card">
        <img src="Logo.png" alt="Logo Colosal Tienda" class="splash__logo" />
      </div>
    </div>

    <!-- principal -->
    <div id="principal" class="page-content page-hidden">
      <main class="app-shell">
        <section class="hero-screen">
          <img src="Logo.png" alt="Logo Colosal Tienda" class="logo-main" />
          <div class="brand-name">
            <span class="brand-name__title">Colosal Bags</span>
          </div>
          <h1>¡Bienvenida!</h1>
          <p>Todo lo que necesitas, en un solo lugar.</p>
          <div class="hero-divider"><span></span><span>❤</span><span></span></div>
        </section>

        <section class="button-grid">
          <button class="nav-button card-button" data-target="whatsapp.html">
            <img src="ws.png" alt="WhatsApp" class="icon-image" />
            <span class="label">WhatsApp</span>
          </button>
          <button class="nav-button card-button" data-target="cuentas.html">
            <span class="icon">🏦</span>
            <span class="label">Cuentas Bancarias</span>
          </button>
          <button class="nav-button card-button" data-target="instagram.html">
            <img src="ig.png" alt="Instagram" class="icon-image" />
            <span class="label">Instagram</span>
          </button>
          <button class="nav-button card-button" data-target="ubicacion.html">
            <span class="icon">📍</span>
            <span class="label">Ubicación</span>
          </button>
        </section>

        <section class="hero-cta">
          <button class="nav-button big-button" data-target="horarios.html">
            <span class="icon">🕒</span>
            <span>Horarios de atención</span>
          </button>
        </section>

        <footer class="app-footer">
          Gracias por ser parte de Colosal <span class="heart">❤</span>
        </footer>
      </main>
    </div>
  </body>
</html>

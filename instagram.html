<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fdf9f8" />
    <title>Instagram · Colosal Bags</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="secondary.css" />
    <link rel="stylesheet" href="design-system.css" />
  </head>
  <body class="ds-page instagram-page">
    <main class="ds-shell instagram-experience">
      <a class="ds-back location-back location-back--top" href="index.html#principal" aria-label="Volver al inicio">← <span>Volver</span></a>

      <div class="ambient ambient--rose" aria-hidden="true"></div>
      <div class="ambient ambient--olive" aria-hidden="true"></div>

      <article class="ds-surface-card instagram-card" aria-labelledby="instagram-title">
        <section class="ds-section-header instagram-copy" aria-labelledby="instagram-title">
          <p class="ds-section-header__eyebrow instagram-eyebrow">El universo Colosal</p>
          <h1 class="ds-section-header__title" id="instagram-title">Un poco más<br /><em>cerca de ti.</em></h1>
          <p class="ds-section-header__intro instagram-intro">Inspiración, nuevos estilos y cada detalle que hace especial a tu próxima Colosal.</p>

          <div class="instagram-handle" aria-label="Perfil de Instagram Colosal Bags">
            <img src="ig.png" alt="" />
            <span>@colosalbags</span>
          </div>

          <div class="button-row instagram-button-row">
            <a class="ds-primary-button" href="https://www.instagram.com/colosalbags?igsh=MTQzM2c0ZHY2aXRodw%3D%3D&utm_source=qr" target="_blank" rel="noreferrer">
              <span>Visitar Instagram</span>
              <span aria-hidden="true">↗</span>
            </a>
            <a class="ds-secondary-button location-back" href="index.html#principal">Volver</a>
          </div>

          <p class="instagram-note">Síguenos para descubrir lo nuevo.</p>
        </section>

        <section class="phone-stage" aria-label="Vista previa del perfil de Instagram de Colosal Bags">
          <div class="glass-orbit glass-orbit--one" aria-hidden="true"></div>
          <div class="glass-orbit glass-orbit--two" aria-hidden="true"></div>
          <div class="phone-shadow" aria-hidden="true"></div>
          <div class="phone">
            <div class="phone__speaker" aria-hidden="true"></div>
            <div class="phone__screen">
              <img class="phone__profile-image" src="instagram-profile-colosal.png" alt="Captura del perfil de Instagram de Colosal Bags" />
            </div>
          </div>
          <p class="phone-caption">Descubre la esencia de Colosal <span>✦</span></p>
        </section>
      </article>
    </main>
